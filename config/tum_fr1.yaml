# config/tum_fr1.yaml
# TUM fr1 数据集参数配置

# 1. 全局路径配置
dataset_dir: "/home/zyj/slam_ws/src/my_slam/sequence/"
pose_file_path: "/home/zyj/slam_ws/src/my_slam/sequence/groundtruth.txt"

# 2. 相机内参 (Camera Intrinsics)
camera:
  fx: 517.3
  fy: 516.5
  cx: 318.6
  cy: 255.3
  depth_scale: 5000.0

# 3. 稠密建图参数 (Mapping Parameters)
mapping:
  voxel_size: 0.01      # 体素滤波的网格大小(米)，越小地图越精细但越吃内存
  publish_freq: 10      # 每隔几帧向 RViz 发布一次地图
  z_min: 0.2            # 剔除距离相机太近的噪点(米)
  z_max: 1.0            # 剔除距离相机太远的噪点(米)
